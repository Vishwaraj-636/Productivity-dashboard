<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
    <link rel="shortcut icon" href="./apple-touch-icon.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body>
    <main>
        <nav>
            <div class="nav-in">
                <h1>Productivity Dashboard</h1>
                <div class="theme">
                    <button class="change-theme">Change Theme</button>
                </div>
            </div>
        </nav>
        <section class="allElems">
            <header>
                <div class="header1">
                    <h2></h2>
                    <h1></h1>
                    <h4></h4>
                </div>
                <div class="header2">
                    <h2></h2>
                    <h4></h4>
                    <h3 class="precipitation"></h3>
                    <h3 class = "humidity"></h3>
                    <h3 class = "winds"></h3>
                </div>
            </header>
            <div class="allFeatures">
                <div class="todo elem" id="0">
                    <img src="./todo.jpg">
                    <h2>To Do List</h2>
                    <div class="bottom"></div>
                </div>
                <div class="daily elem" id="1">
                    <img src="./dailyplanner.jpg">
                    <h2>Daily Planner</h2>
                    <div class="bottom"></div>
                </div>
                <div class="Pomod elem" id="2">
                    <img src="./pmo.jpg">
                    <h2>Pomodoro</h2>
                    <div class="bottom"></div>
                </div>
                <div class="motivation elem" id="3">
                    <img src="./moti.jpg">
                    <h2>Motivation</h2>
                    <div class="bottom"></div>
                </div>
                <!-- <div class="goals elem" id="4">
                    <img src="./goals.jpg">
                    <h2>Daily goals</h2>
                    <div class="bottom"></div>
                </div> -->
            </div>
        </section>
        
        <section class="fullElem todo-list-fullpage">
            <button class="back" id="0">Close</i></button>
            <h2>Your Personalised Task List</h2>
            <div class="todo-container">
                <div class="addTask">
                    <form>
                        <input type="text" placeholder="Enter Task" id="task-input">
                        <textarea placeholder="Enter Details" name="" rows="8"></textarea>
                        <div class="mark-imp">
                            <input type="checkbox" id="check">
                            <label for="check">Mark as Important</label>
                        </div>
                        <button>Add task</button>
                    </form>
                </div>
                <div class="allTask">
                    
                </div>
            </div>
        </section>
        <section class="fullElem daily-planner-fullpage">
            <button class="back" id="1">Close</i></button>
            <h2>Plan your Day to be more Productive</h2>
            <div class="day-planner"></div>
        </section>
        <section class="fullElem pomodoro-fullpage">
            <button class="back" id="2">Close</i></button>
            <h2>Study with me!</h2>
            <h4 class="session">Work Session</h4>
            <div class="pomo-timer">
                <h1>25:00</h1>
                <div class="timer-btn">
                    <button class="start-timer">Start</button>
                    <button class="pause-timer">Pause</button>
                    <button class="reset-timer">Reset</button>
                </div>
            </div>
        </section>
        <section class="fullElem motivation-fullpage">
            <button class="back" id="3">Close</i></button>
            <div class="motivation-fullpage-container">
                <div class="motivation-container">
                    <div class="motivation-wrapper">
                        <div class="motivation-1">
                            <img src="./icons8-quote-100.png">
                            <h2>Quote of the day</h2>
                        </div>
                        <div class="motivation-2">
                            <h1></h1>
                        </div>
                        <div class="motivation-3">
                            <h2></h2>
                        </div>
                    </div>
                </div>
            </div>
            
        </section>
        <!-- <section class="fullElem goals-fullpage">
            <button class="back" id="4">Close</i></button>
            <h1>Goals</h1>
        </section> -->
        
    </main>
    

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productivity Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet"/>
</head>
<body>
    <main>
       <!--  <nav></nav> -->
        <section class="allElems">
            <div class="todo elem" id="0">
                <img src="https://plus.unsplash.com/premium_photo-1739123348022-26d5bd055ccd?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
                <h2>To Do List</h2>
            </div>
            <div class="daily elem" id="1">
                <img src="https://plus.unsplash.com/premium_photo-1691868613750-d43087bdb5a9?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
                <h2>Daily Planner</h2>
            </div>
            <div class="Pomod elem" id="2">
                <img src="https://images.unsplash.com/photo-1610476840592-0743ba8caec5?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTR8fHN1bnJpc2UlMjBtb3VudGFpbnxlbnwwfHwwfHx8MA%3D%3D">
                <h2>Pomodoro</h2>
            </div>
            <div class="motivation elem" id="3">
                <img src="https://plus.unsplash.com/premium_photo-1673002094058-8598519236db?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D">
                <h2>Motivation</h2>
            </div>
            <div class="goals elem" id="4">
                <img src="https://plus.unsplash.com/premium_photo-1673603988195-1253725273e8?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NXx8c3VucmlzZSUyMG1vdW50YWlufGVufDB8fDB8fHww">
                <h2>Daily goals</h2>
            </div>
        </section>

        <section class="fullElem todo-list-fullpage">
            <button class="back" id="0">Close</i></button>
            <h2>Your Personalised Task List</h2>
            <div class="todo-container">
                <div class="addTask">
                    <form>
                        <input type="text" placeholder="Enter Task" id="task-input">
                        <textarea placeholder="Enter Details" name="" rows="8"></textarea>
                        <div class="mark-imp">
                            <input type="checkbox" id="check">
                            <label for="check">Mark as Important</label>
                        </div>
                        <button>Add task</button>
                    </form>
                </div>
                <div class="allTask">
                    
                </div>
            </div>
        </section>
        <section class="fullElem daily-planner-fullpage">
            <button class="back" id="1">Close</i></button>
            <h2>Plan your Day to be more Productive</h2>
        </section>
        <section class="fullElem pomodoro-fullpage">
            <button class="back" id="2">Close</i></button>
            <h1>Pomodoro Timer</h1>
        </section>
        <section class="fullElem motivation-fullpage">
            <button class="back" id="3">Close</i></button>
            <h1>Motivational Quotes</h1>
        </section>
        <section class="fullElem goals-fullpage">
            <button class="back" id="4">Close</i></button>
            <h1>Goals</h1>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
